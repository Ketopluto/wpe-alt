name: Build WPE-Alt (Windows)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Qt
      uses: miurahr/setup-qt-action@v3
      with:
        version: '6.5.0'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'

    - name: Restore vcpkg artifacts
      uses: actions/cache@v4
      with:
        path: |
          ${{ github.workspace }}/vcpkg/installed
          ${{ github.workspace }}/vcpkg/downloads
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('**/vcpkg.json') }}-ffmpeg
        restore-keys: |
          ${{ runner.os }}-vcpkg-

    - name: Install FFmpeg via vcpkg
      run: |
        vcpkg install ffmpeg:x64-windows

    - name: Configure CMake
      run: |
        cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE=Release

    - name: Build project
      run: |
        cmake --build build --config Release

    - name: Run Tests
      working-directory: build
      run: |
        ctest -C Release --output-on-failure

    - name: Deploy Qt DLLs
      run: |
        # Use windeployqt to copy required Qt DLLs to the executable directory
        windeployqt --release build\Release\wpe-lite.exe

    - name: Copy FFmpeg DLLs
      run: |
        # Copy FFmpeg DLLs from vcpkg to the build folder
        Copy-Item "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin\*.dll" -Destination build\Release\

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WPE-Alt-Windows
        path: build\Release\*
